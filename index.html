<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura.amp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; font-size: 1.3em;">AURA.AMP</h3>
            <button id="theme-toggle" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">☀️</button>
        </div>

        <div id="chat-window">
            <div id="output"></div>
        </div>

        <div id="emoji-bar" style="margin-bottom: 5px; cursor: pointer; font-size: 1.2rem;">
            <span>🔥</span> <span>😂</span> <span>❤️</span> <span>⚡</span> <span>🚀</span>
        </div>

        <input id="handle" type="text" placeholder="Adın (Aura Kimliği)">
        <input id="message" type="text" placeholder="Mesajını yaz...">

        <div class="button-group">
            <button id="send">Gönder ⚡</button>
            <button id="record-btn" style="background: #3ba55e; max-width: 50px;">🎤</button>
            <button id="clear">Temizle 🗑️</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
